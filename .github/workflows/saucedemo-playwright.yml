name: SauceDemo Playwright Tests

on:
  push:
    branches: [main]
    paths:
      - 'SauceDemoScripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'SauceDemoScripts/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SauceDemoScripts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SauceDemoScripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: SauceDemoScripts/playwright-report/
          retention-days: 30
